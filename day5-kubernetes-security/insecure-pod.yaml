apiVersion: v1
kind: Pod
metadata:
  name: insecure-pod
  namespace: security-lab
  labels:
    app: insecure-demo
spec:
  containers:
  - name: insecure-container
    image: ubuntu:latest
    command: ["sleep", "infinity"]
    securityContext:
      runAsUser: 0
      allowPrivilegeEscalation: true
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"