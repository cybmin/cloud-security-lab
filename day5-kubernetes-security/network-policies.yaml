# ── DENY ALL INGRESS BY DEFAULT ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: security-lab
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# ── FRONTEND POLICY ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: security-lab
spec:
  podSelector:
    matchLabels:
      tier: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - to:
    - podSelector:
        matchLabels:
          tier: backend
  # Allow DNS so service names resolve
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# ── BACKEND POLICY ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: security-lab
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          tier: frontend
  egress:
  - to:
    - podSelector:
        matchLabels:
          tier: database
  # Allow DNS so service names resolve
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# ── DATABASE POLICY ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-policy
  namespace: security-lab
spec:
  podSelector:
    matchLabels:
      tier: database
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          tier: backend
  egress: []